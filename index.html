<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- daisiUI and tailwind css cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awosome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="font-[Outfit] bg-slate-50 min-h-screen py-3">
    <!-- header section -->
    <header class="xs:bg-blue-300 w-11/12 mx-auto">
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold opacity-80 mb-5">Job Application Tracker</h1>
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white shadow-sm p-4 rounded-sm">
                <strong class="font-normal text-sm">Total</strong>
                <h3 id="total_job" class="mt-1 text-2xl font-bold">10</h3>
            </div>
            <div class="bg-white shadow-sm p-4 rounded-sm">
                <strong class="font-normal text-sm">Interview</strong>
                <h3 id="total_interview" class="mt-1 text-2xl font-bold text-green-500">3</h3>
            </div>
            <div class="bg-white shadow-sm p-4 rounded-sm">
                <strong class="font-normal text-sm">Rejected</strong>
                <h3 id="total_rejected" class="mt-1 text-2xl font-bold text-red-500">7</h3>
            </div>
        </section>
    </header>

    <!-- horizontal line -->
    <hr class="text-gray-300 w-11/12 m-auto mt-10">

    <!-- main seciton -->
    <main class="mt-8 w-11/12 mx-auto">
        <!-- available job counter section -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-2xl font-bold">Available Jobs</h2>
            <h3 class="text-lg font-bold opacity-70"><span id="available_job">10</span><span>Jobs</span></h3>
        </div>
    </main>

    <!-- javascript files added here -->
    <script src="./script.js"></script>
</body>

</html>
